<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Visual Vocabulary Builder - 
                Learn English vocabulary with images, audio pronunciation, 
                and interactive flashcards. Build your vocabulary through visual learning.">
    <meta name="keywords" content="vocabulary, learn english, flashcards, 
                visual learning, ESL, education">
    <meta name="author" content="Emerson Ronald Pereira">
    <meta name="robots" content="index, follow">
    
    <title>Visual Vocabulary Builder - Learn English with Images & Audio</title>
    
    <!-- Fonts -->
    <link rel="icon" href="vocabo-builder.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@300;400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <h1>📚 VOCAB BUILDER</h1>
                <p>Visual learning for English vocabulary</p>
            </div>
            <div class="nav-buttons">
                <button id="themeToggle" class="btn-icon" aria-label="Toggle dark/light mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Enter a word..." aria-label="Word to search">
                <button id="searchBtn" class="btn-search" aria-label="Search word">Search</button>
            </div>
            <div id="searchHistory" class="search-history" aria-label="Search history"></div>
        </div>

        <div id="flashcard" class="flashcard" aria-label="Word flashcard"></div>

        <div id="librarySection" class="library-section" aria-label="Saved words library">
            <div class="section-title">
                <h2><i class="fas fa-book"></i> My Library</h2>
                <button id="clearLibraryBtn" class="btn-danger" aria-label="Clear all saved words">Clear All</button>
            </div>
            <div id="libraryGrid" class="library-grid"></div>
        </div>

        <div id="profileSection" class="profile-section" aria-label="User profile statistics">
            <h2><i class="fas fa-user"></i> My Profile</h2>
            <div class="stats-card">
                <div class="stat-number" id="totalWordsLearned">0</div>
                <p>Words Learned</p>
                <hr style="margin: 1rem 0;">
                <div class="stat-number" id="reviewCount">0</div>
                <p>Total Reviews</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-menu">
            <button class="nav-item active" data-section="home" aria-label="Go to home"><i class="fas fa-home"></i><span>Home</span></button>
            <button class="nav-item" data-section="library" aria-label="Go to library"><i class="fas fa-book"></i><span>Library</span></button>
            <button class="nav-item" data-section="review" aria-label="Start review mode"><i class="fas fa-random"></i><span>Review</span></button>
            <button class="nav-item" data-section="profile" aria-label="View profile"><i class="fas fa-user"></i><span>Profile</span></button>
        </div>
    </div>

    <footer>
        <p>© 2025 Visual Vocabulary Builder • Visual learning for English vocabulary</p>
    </footer>

    <div id="reviewModal" class="review-mode" aria-label="Review mode">
        <div class="review-card">
            <h2 class="review-word" id="reviewWord"></h2>
            <p class="review-definition" id="reviewDefinition"></p>
            <div class="review-buttons">
                <button id="reviewWrong" class="btn btn-danger" aria-label="Mark as wrong">❌ Wrong</button>
                <button id="reviewCorrect" class="btn btn-primary" aria-label="Mark as correct">✅ Correct</button>
                <button id="reviewClose" class="btn btn-secondary" aria-label="Close review">Close</button>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/app.js"></script>
</body>
</html>
